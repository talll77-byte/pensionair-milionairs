
<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>הזמנה רשמית: יום פנסיה</title>
    <style>
        :root {
            --gold: #d4af37;
            --dark-gold: #b8860b;
            --champagne: #f7e7ce;
            --cream-bg: #fffdfa;
        }
        body {
            background-color: #e8e8e8;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .card {
            background-color: var(--cream-bg);
            width: 100%;
            max-width: 400px;
            padding: 40px 30px;
            border-radius: 20px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.2);
            border: 10px double var(--gold); /* מסגרת זהב עבה וכפולה */
            text-align: center;
            position: relative;
            box-sizing: border-box;
        }
        .champagne-icon {
            font-size: 50px;
            margin-bottom: 10px;
            display: block;
        }
        h1 {
            color: var(--dark-gold);
            font-size: 28px;
            margin-bottom: 20px;
            border-bottom: 1px solid var(--gold);
            display: inline-block;
            padding-bottom: 5px;
        }
        .content {
            font-size: 19px;
            line-height: 1.8;
            color: #333;
            margin-bottom: 30px;
            font-weight: 500;
        }
        .highlight {
            color: var(--dark-gold);
            font-weight: bold;
        }
        .btn-container {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .btn {
            background: linear-gradient(135deg, var(--gold), var(--dark-gold));
            color: white;
            padding: 15px 25px;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            font-size: 18px;
            border: none;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(212, 175, 55, 0.4);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn:active {
            transform: scale(0.95);
        }
        /* בועית הודעה */
        #bubble {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 50px rgba(0,0,0,0.5);
            border: 3px solid var(--gold);
            z-index: 1000;
            text-align: center;
            width: 250px;
        }
        #bubble h2 {
            color: var(--dark-gold);
            margin: 0;
            font-size: 22px;
        }
        #overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6);
            z-index: 999;
        }
    </style>
</head>
<body>

    <div class="card">
        <span class="champagne-icon">🥂</span>
        <h1>הודעה מערכתית:</h1>
        
        <div class="content">
            הופעל נוהל <span class="highlight">"פנסיה"</span> מוקדמת ליום הנוכחי.<br><br>
            <strong>חלון תחזוקה:</strong> החל מ-09:30 ועד הודעה חדשה.<br><br>
            נא להצטייד בבגדי ים וגישה של מיליונרים בפרישה.<br><br>
            אישור הגעה ב-Reply מהיר.
        </div>

        <div class="btn-container">
            <button class="btn" onclick="showBubble()">מאשר הגעה</button>
            <button class="btn" onclick="showBubble()">מאשרת הגעה</button>
        </div>
    </div>

    <!-- בועית הפתעה -->
    <div id="overlay" onclick="closeBubble()"></div>
    <div id="bubble">
        <h2>היה לי ברור!</h2>
        <p style="font-size: 18px;">יאללה תתלבש 😎</p>
        <button onclick="closeBubble()" style="margin-top:10px; border:none; background:none; color:var(--dark-gold); font-weight:bold; cursor:pointer;">סגור</button>
    </div>

    <script>
        function showBubble() {
            document.getElementById('bubble').style.display = 'block';
            document.getElementById('overlay').style.display = 'block';
        }
        function closeBubble() {
            document.getElementById('bubble').style.display = 'none';
            document.getElementById('overlay').style.display = 'none';
        }
    </script>

</body>
</html>
